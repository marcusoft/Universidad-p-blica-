<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Marco Personalizado con Logo UNaM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; padding: 20px; }
        .canvas-container { border: 2px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center; }
        button, label { padding: 10px 20px; background: #016f49; /* Color verde UNaM */ color: white; border: none; border-radius: 5px; cursor: pointer; }
        input[type="file"] { display: none; }
        #download { background: #28a745; }
    </style>
</head>
<body>

    <h1>Generador de Marco: Tu Foto + UNaM</h1>
    
    <div class="canvas-container">
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <label for="upload">1. Elegir mi Foto</label>
        <input type="file" id="upload" accept="image/*">
        <button id="download">2. Descargar mi Avatar</button>
    </div>

    <script>
        const canvas = new fabric.Canvas('canvas');
        const marcoURL = 'URL_DE_TU_MARCO_PNG_AQUI'; // Reemplaza con la URL de tu marco transparente
        const logoUnamURL = 'https://www.unam.edu.ar/images/documentos/extension/logosunam/01_UNaM_Version_Horizontal_color.png'; // Logo oficial UNaM

        // 1. Cargar el marco (siempre arriba)
        fabric.Image.fromURL(marcoURL, function(img) {
            if (!img) { console.error('No se pudo cargar el marco. Verifica la URL.'); return; }
            img.set({
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height,
                selectable: false,
                evented: false
            });
            canvas.setOverlayImage(img, canvas.renderAll.bind(canvas));
        });

        // 2. Cargar el logo de la UNaM (se superpone al marco)
        fabric.Image.fromURL(logoUnamURL, function(logo) {
            if (!logo) { console.error('No se pudo cargar el logo de la UNaM.'); return; }
            const scale = 0.25; // Escala el logo al 25% de su tamaño original
            logo.set({
                scaleX: scale,
                scaleY: scale,
                left: 10, // Distancia desde la izquierda
                top: 10,  // Distancia desde arriba
                selectable: false, // El logo no se puede mover
                evented: false     // No interactúa
            });
            canvas.add(logo);
        });

        // 3. Subir y acomodar la foto
        document.getElementById('upload').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function() {
                    const image = new fabric.Image(imgObj);
                    image.set({
                        left: (canvas.width / 2) - 150, // Centrar inicialmente
                        top: (canvas.height / 2) - 150,
                        angle: 0,
                        padding: 10,
                        cornersize: 10,
                        hasRotatingPoint: true
                    });
                    image.scaleToWidth(300);
                    canvas.add(image);
                    canvas.sendToBack(image); // La foto va detrás del marco y el logo
                };
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // 4. Descargar el resultado
        document.getElementById('download').onclick = function() {
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1
            });
            const link = document.createElement('a');
            link.download = 'mi-avatar-unam.png';
            link.href = dataURL;
            link.click();
        };
    </script>
</body>
</html>
