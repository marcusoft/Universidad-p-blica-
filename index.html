<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Marco UNaM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; color: #333; }
        h1 { color: #016f49; margin-bottom: 10px; }
        p { margin-bottom: 20px; text-align: center; max-width: 600px; }
        .canvas-container { border: 5px solid #fff; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); margin-bottom: 20px; background-color: #ddd; }
        .controls { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        button, label { padding: 12px 24px; background: #016f49; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover, label:hover { background: #014d33; }
        #download { background: #28a745; }
        #download:hover { background: #1e7e34; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <h1>Generador de Marco Personalizado</h1>
    <p>Seleccioná tu foto, acomodala con el mouse o los dedos y descargá tu avatar con el logo de la Universidad Nacional de Misiones.</p>
    
    <div class="canvas-container">
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <label for="upload">1. Elegir mi Foto</label>
        <input type="file" id="upload" accept="image/*">
        <button id="download">2. Descargar mi Avatar</button>
    </div>

    <script>
        const canvas = new fabric.Canvas('canvas');
        
        // --- CONFIGURACIÓN DE IMÁGENES ---
        // 1. URL del Marco (Debe ser PNG con centro transparente)
        const marcoURL = 'https://sudhurok.github.io/reloj-ley-universitaria/marco.png'; 
        
        // 2. URL del Logo UNaM
        const logoUnamURL = 'https://www.unam.edu.ar/images/documentos/extension/logosunam/01_UNaM_Version_Horizontal_color.png';

        // FUNCIÓN PARA CARGAR EL MARCO Y EL LOGO AL INICIO
        function inicializarDiseño() {
            // Cargar el Marco
            fabric.Image.fromURL(marcoURL, function(img) {
                if(img) {
                    img.set({
                        scaleX: canvas.width / img.width,
                        scaleY: canvas.height / img.height,
                        selectable: false,
                        evented: false,
                        originX: 'left',
                        originY: 'top'
                    });
                    canvas.setOverlayImage(img, canvas.renderAll.bind(canvas));
                }
            }, { crossOrigin: 'anonymous' });

            // Cargar el Logo UNaM
            fabric.Image.fromURL(logoUnamURL, function(logo) {
                if(logo) {
                    const scale = 0.25; 
                    logo.set({
                        scaleX: scale,
                        scaleY: scale,
                        left: 20, 
                        top: 20,
                        selectable: false,
                        evented: false
                    });
                    canvas.add(logo);
